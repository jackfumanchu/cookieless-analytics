name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Tests + coverage + Infection (PHP 8.4, PostgreSQL)
  coverage:
    name: Coverage + Infection (PHP 8.4)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          coverage: pcov

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-8.4-${{ hashFiles('composer.lock') }}
          restore-keys: composer-8.4-

      - run: composer install --no-progress --prefer-dist --no-interaction

      - run: vendor/bin/phpunit --testsuite default --coverage-xml=coverage/coverage-xml --log-junit=coverage/junit.xml --coverage-clover=coverage/clover.xml
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/cookieless_analytics_test

      - name: SQLite integration tests
        run: vendor/bin/phpunit -c phpunit.sqlite.xml --no-coverage

      - name: Mutation testing
        run: vendor/bin/infection --threads=4 --no-progress --logger-github --coverage=coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/cookieless_analytics_test
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/clover.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  # Compatibilité multi-PHP (PostgreSQL, sans coverage)
  compat:
    name: Compat (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - run: composer install --no-progress --prefer-dist --no-interaction

      - run: vendor/bin/phpunit --testsuite default --no-coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/cookieless_analytics_test

      - name: SQLite integration tests
        run: vendor/bin/phpunit -c phpunit.sqlite.xml --no-coverage

  quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-8.4-${{ hashFiles('composer.lock') }}
          restore-keys: composer-8.4-

      - run: composer install --no-progress --prefer-dist --no-interaction

      - run: vendor/bin/phpstan analyse
